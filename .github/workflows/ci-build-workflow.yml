name: CI Build All Modules

on:
  push:
    branches:
      - main
      - feature/admin
      - feature/seller
      - feature/warehouse
    paths:
      - "app/admin/**"
      - "app/seller/**"
      - "app/warehouse/**"
  pull_request:
    branches:
      - main
    paths:
      - "app/admin/**"
      - "app/seller/**"
      - "app/warehouse/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Check for restricted files in .cursor/rules
        run: |
          git fetch origin main --quiet
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          if echo "$CHANGED_FILES" | grep -q "^.cursor/rules/"; then
            echo "ERROR: Restricted files found in .cursor/rules/"
            echo "$CHANGED_FILES" | grep "^.cursor/rules/"
            exit 1
          fi

      - name: Build Next.js project
        run: npm run build
